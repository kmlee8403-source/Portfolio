  <script>
    const projects = [
      {

      },

      },
      {
        title: '언밸런스 업사이클링 티 테이블',
        subtitle: '2023. 11 | 목재 업사이클링 설계 및 제작 / 납품',
        type: 'photo',
        image: 'image/woodwork/woodwork-table.jpg',
        label: 'Unbalance Tea Table',
        description: '소장 목재의 깎여나간 모서리와 원재료의 형태를 살려 한쪽 다리를 의도적으로 노출하고, 상판과 다리를 플로팅하는 방식으로 설계했습니다. 다리는 버려지는 목재 팔레트를 활용했습니다.'
      },
      {

        subtitle: '2023. 09 | 고급 특수목 정밀 각인 설계 및 납품',

        description: '호두나무 특수목의 짙은 가공면을 정밀한 레이저 출력 조정으로 불필요한 그을음 없이 깊게 각인했습니다. 내습성과 목재 고유의 중후함을 살린 브랜드 맞춤 돌출 프레임입니다.'
      },
      {
        title: '오픈형 책장 및 상판 설계',

      },
      {

      },
      {

        icon: 'fa-shapes',
        label: '3D CAD Blueprint',
        description: '나무 본연의 촉감과 기하학적 도형 감각을 조화롭게 키우도록 설계한 유아 교육용 입체 블록 세트입니다.'
      },
      {
        title: '오션드럼 (Ocean Drum) 설계',
        subtitle: '2022. 10 | 진동 및 사물 음향 시뮬레이션 기반 드럼 하우징',
        type: 'blueprint',
        icon: 'fa-record-vinyl',
        label: '3D CAD Blueprint',
        description: '투명 아크릴 전면부와 천연 원목 프레임을 기밀하게 고정하는 실링 조인트 설계안입니다. 내부 금속 비드가 굴러가며 파도 소리를 모사하도록 체적과 구조를 설계했습니다.'
      },
      {
        title: '레인스틱 (Rain Stick) 설계',
        subtitle: '2022. 10 | 나선형 격막 배치 및 마찰핀 3D 모델링 설계',
        type: 'blueprint',
        icon: 'fa-cloud-rain',
        label: '3D CAD Blueprint',
        description: '길쭉한 구조체 내부의 나선형 격막과 마찰핀 위치를 가시화한 설계안입니다. 내부 미디어가 낙하하며 발생시키는 시간차 소음 제어 메커니즘을 3D 도면에 매핑했습니다.'
      },
      {
        title: '피아노 칼림바 하우징 설계',
        subtitle: '2021. 10 | 음향 공명 및 플레이트 유격 제정 모델',
        type: 'blueprint',
        icon: 'fa-music',
        label: '3D CAD Blueprint',
        description: '칼림바의 공명 주파수 특성을 고려해 하우징 벽면 두께와 가공 테이퍼각을 OnShape에서 최적화한 설계안입니다. 금속 건반 지지 플레이트가 하우징과 유격 없이 결합되도록 계산했습니다.'
      }
    ];

    const gallery = document.getElementById('gallery');
    const modal = document.getElementById('detail-modal');
    const modalMedia = document.getElementById('modal-media');
    const modalTag = document.getElementById('modal-tag');
    const modalTitle = document.getElementById('modal-title');
    const modalSubtitle = document.getElementById('modal-subtitle');
    const modalDescription = document.getElementById('modal-description');

    function mediaMarkup(project, modalView = false) {
      if (project.type === 'photo') {
        return `
          <div class="absolute inset-0 bg-cover bg-center blur-xl opacity-30 scale-110" style="background-image:url('${project.image}')"></div>
          <img src="${project.image}" alt="${project.title}" class="relative z-10 ${modalView ? 'max-h-[70vh]' : 'max-h-full'} max-w-full object-contain" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden')">
          <div class="hidden relative z-10 flex flex-col items-center justify-center text-slate-500">
            <i class="fa-solid fa-image text-5xl text-amber-500/60"></i>
            <span class="mt-3 text-xs font-semibold">작품 이미지 준비 중</span>
          </div>
        `;
      }
      return `
        <div class="blueprint-grid absolute inset-0"></div>
        <div class="relative z-10 flex flex-col items-center justify-center text-blue-400">
          <i class="fa-solid ${project.icon} ${modalView ? 'text-8xl' : 'text-6xl'}"></i>
          <div class="mt-5 font-mono text-[10px] tracking-[.25em] text-slate-500">3D CAD / TECHNICAL DRAWING</div>
          <div class="mt-4 h-px w-28 bg-blue-400/50 relative before:absolute before:-top-1 before:left-0 before:h-2 before:w-px before:bg-rose-400 after:absolute after:-top-1 after:right-0 after:h-2 after:w-px after:bg-rose-400"></div>
        </div>
      `;
    }

    function render(filter = 'all') {
      const visible = filter === 'all' ? projects : projects.filter(project => project.type === filter);
      gallery.innerHTML = visible.map(project => `
        <button type="button" class="project-card group text-left rounded-2xl border ${project.type === 'photo' ? 'border-slate-800/80' : 'border-blue-500/25'} bg-slate-900/40 p-5 hover:-translate-y-1 hover:border-brand-500/50 hover:shadow-xl transition-all" data-index="${projects.indexOf(project)}">
          <div class="relative aspect-video overflow-hidden rounded-xl border border-slate-800 bg-slate-950 flex items-center justify-center">
            ${mediaMarkup(project)}
          </div>
          <span class="mt-4 inline-flex rounded-md border px-2.5 py-1 text-[10px] font-bold ${project.type === 'photo' ? 'border-amber-500/20 bg-amber-500/10 text-amber-400' : 'border-blue-500/20 bg-blue-500/10 text-blue-400'}">${project.label}</span>
          <h2 class="mt-3 text-lg font-bold text-white group-hover:text-brand-400 transition">${project.title}</h2>
          <p class="mt-1 text-xs leading-relaxed text-slate-500">${project.subtitle}</p>
        </button>
      `).join('');
    }

    function openModal(index) {
      const project = projects[index];
      modalMedia.innerHTML = mediaMarkup(project, true);
      modalTag.textContent = project.type === 'photo' ? 'WOOD WORK · PHOTO' : '3D CAD · BLUEPRINT';
      modalTag.className = `inline-flex rounded-md border px-2.5 py-1 text-[10px] font-bold ${project.type === 'photo' ? 'border-amber-500/20 bg-amber-500/10 text-amber-400' : 'border-blue-500/20 bg-blue-500/10 text-blue-400'}`;
      modalTitle.textContent = project.title;
      modalSubtitle.textContent = project.subtitle;
      modalDescription.textContent = project.description;
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      requestAnimationFrame(() => modal.classList.remove('opacity-0'));
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.add('opacity-0');
      window.setTimeout(() => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = '';
      }, 200);
    }

    document.getElementById('filters').addEventListener('click', event => {
      const button = event.target.closest('.filter-btn');
      if (!button) return;
      document.querySelectorAll('.filter-btn').forEach(item => {
        item.className = 'filter-btn rounded-full bg-slate-900 border border-slate-800 px-4 py-2 text-xs font-bold text-slate-400 hover:border-brand-500/40';
      });
      button.className = 'filter-btn rounded-full bg-brand-600 border border-brand-500 px-4 py-2 text-xs font-bold text-white';
      render(button.dataset.filter);
    });

    gallery.addEventListener('click', event => {
      const card = event.target.closest('.project-card');
      if (card) openModal(Number(card.dataset.index));
    });
    document.getElementById('modal-close').addEventListener('click', closeModal);
    modal.addEventListener('click', event => {
      if (event.target === modal) closeModal();
    });
    window.addEventListener('keydown', event => {
      if (event.key === 'Escape' && !modal.classList.contains('hidden')) closeModal();
    });

    const backToTop = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('opacity-0', window.scrollY < 400);
      backToTop.classList.toggle('translate-y-16', window.scrollY < 400);
    });
    backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    render();
  </script>
</body>
</html>
